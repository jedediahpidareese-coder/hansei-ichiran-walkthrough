<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HI Viewer — Annotation Calibrator (self-contained, local-only)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", sans-serif; background:#222; color:#eee; }
    header { padding: 8px 14px; background:#1a242f; display:flex; gap:14px; align-items:center; flex-wrap:wrap; border-bottom: 2px solid #000; }
    header h1 { margin: 0; font-size:16px; font-weight:500; }
    header select, header button { padding: 4px 8px; font-size: 13px; }
    .help { font-size: 12px; color: #aaa; }
    main { display: flex; height: calc(100vh - 90px); }
    #osd { flex: 1; background: #000; position: relative; }
    aside { width: 460px; background: #2c3e50; overflow-y: auto; border-left: 1px solid #000; display:flex; flex-direction:column; }
    .coord-readout {
      position: absolute; top: 10px; right: 10px; z-index: 100;
      background: rgba(0,0,0,0.85); color: #0f0; padding: 6px 10px;
      font-family: monospace; font-size: 14px; border-radius: 4px;
      pointer-events: none;
    }
    .ann-list { padding: 8px; flex: 1; overflow-y: auto; }
    .ann-row { background: #34495e; margin: 4px 0; padding: 8px; border-radius: 3px; font-size: 12px; cursor: pointer; }
    .ann-row.active { background: #16a085; }
    .ann-row .ident { font-weight: 600; font-size: 14px; margin-bottom: 4px; font-family: "Yu Mincho", serif; }
    .ann-row .coords { font-family: monospace; color: #bdc3c7; font-size: 11px; }
    .ann-row .coords input { width: 60px; padding: 2px 4px; font-size: 11px; font-family: monospace; background: #1a242f; color: #ecf0f1; border: 1px solid #555; }
    .ann-row .controls { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .ann-row button { font-size: 11px; padding: 3px 6px; cursor: pointer; }
    .toolbar { padding: 8px 12px; background: #34495e; border-bottom: 1px solid #1a242f; display:flex; gap:8px; flex-wrap: wrap; align-items: center; }
    .toolbar button { padding: 5px 10px; font-size: 12px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 3px; }
    .toolbar button.export { background: #27ae60; }
    textarea#export-box { width: calc(100% - 16px); height: 220px; background: #1a242f; color: #2ecc71; font-family: monospace; font-size: 11px; padding: 8px; margin: 8px; border: 1px solid #000; }
    .bbox-overlay { position: absolute; pointer-events: none; border: 2px solid #f39c12; background: rgba(243, 156, 18, 0.18); z-index: 50; }
    .bbox-overlay.active { border-color: #1abc9c; background: rgba(26, 188, 156, 0.30); border-width: 3px; }
    .bbox-overlay .ident-label { position: absolute; top: -22px; left: 0; background: #f39c12; color: black; padding: 1px 6px; font-size: 11px; font-weight: 600; white-space: nowrap; font-family: "Yu Mincho", serif; }
    .bbox-overlay.active .ident-label { background: #1abc9c; }
    .instructions { padding: 8px 14px; background: #fef9e7; color: #7a5d00; font-size: 12px; border-bottom: 1px solid #f39c12; }
  </style>
</head>
<body>
  <header>
    <h1>HI Calibrator</h1>
    <label>Page: <select id="page-select"></select></label>
    <span class="help" id="status">Loaded 8 pages with inlined annotation data.</span>
  </header>
  <div class="instructions">
    <strong>Workflow:</strong> Click an annotation in the right panel → zooms to that bbox + shows it in teal. Hover the image to read pixel coords (green, top-right). Edit X/Y/W/H to move the bbox (live). When done, click <em>Export</em> for the updated JSON.
  </div>
  <main>
    <div id="osd"><div class="coord-readout" id="readout">x=— y=—</div></div>
    <aside>
      <div class="toolbar">
        <button id="reload-orig">⟳ Reload</button>
        <button id="shift-y-down">all y +50</button>
        <button id="shift-y-up">all y −50</button>
        <button id="shift-x-left">all x −50</button>
        <button id="shift-x-right">all x +50</button>
        <button class="export" id="export-btn">📋 Export JSON</button>
      </div>
      <div class="ann-list" id="ann-list"></div>
      <textarea id="export-box" readonly placeholder="Click Export to see the JSON for this page."></textarea>
    </aside>
  </main>

onical": "土佐藩", "domain_hi_name": "高知藩", "domain_en": "Tosa", "image": "images/upper_p089_left.jpg", "volume": "vol1", "pdf_page": 89, "page_side": "L", "book_page": "百五十三", "page_header_kanji": "藩制一覧表第二 (高知)", "page_header_en": "Domain Survey Table 2 (Kōchi)", "table_number": 2, "page_topic": "kokudaka + 5-year average + 戸數 total + product list", "page_summary_en": "Tosa's Table 2 page shows the 5-year-average kokudaka (草高 495,486; current rice 現米 189,431; tax sub-categories including 茅蠟 wax and 海藻 seaweed products); 戸數 (93,736 total). The 5-year averaging annotation 甲子ヨリ戊辰 (from Kashi to Boshin = 1864–1868) covers the run-up to and through the Boshin War."}, {"id": "tosa_demographics", "sequence": 6, "domain_canonical": "土佐藩", "domain_hi_name": "高知藩", "domain_en": "Tosa", "image": "images/upper_p090_right.jpg", "volume": "vol1", "pdf_page": 90, "page_side": "R", "book_page": "百五十六", "page_header_kanji": "藩制一覧表第二 (高知)", "page_header_en": "Domain Survey Table 2 (Kōchi)", "table_number": 2, "page_topic": "shizoku and sotsu persons + households + eta/hinin sub-counts", "page_summary_en": "Tosa's demographic detail page: 士族 35,068 persons (with M+F sub-totals 15,368 + 19,700 = 35,068 internally consistent ✓), 卒族 17,681 persons, 士族戸數 7,269, 卒族戸數 3,713, plus 穢多戸數 3,396 and other status-class sub-counts. The shizoku ratio (53 persons per 100 households) is unusually high, reflecting Tosa's large gōshi (郷士) samurai class."}, {"id": "saga_kokudaka", "sequence": 7, "domain_canonical": "佐賀藩", "domain_hi_name": "佐嘉藩", "domain_en": "Saga", "image": "images/lower_p045_left.jpg", "volume": "vol2", "pdf_page": 45, "page_side": "L", "book_page": "六十七", "page_header_kanji": "藩制一覧表第六 (佐嘉)", "page_header_en": "Domain Survey Table 6 (Saga)", "table_number": 6, "page_topic": "kokudaka via 'two-mouth combined / 5-year average' + main tax rice", "page_summary_en": "Saga's kokudaka entry uses an unusual phrasing: 貮口合 平均 ('two-mouth combined, average') = 724,739.3152 koku, which is the 5-year average of (高 211,519 + 新田高 513,580). This is Saga's equivalent of 合高. The 正租 米 = 213,478 koku and 取納現米 = 217,789 koku also appear here. Saga is the only focal-4 domain entered ONLY in vol2 (no vol1 entry); the 'gap' is documented in memory reference_saga_HI_gap."}, {"id": "saga_demographics", "sequence": 8, "domain_canonical": "佐賀藩", "domain_hi_name": "佐嘉藩", "domain_en": "Saga", "image": "images/lower_p046_left.jpg", "volume": "vol2", "pdf_page": 46, "page_side": "L", "book_page": "六十九", "page_header_kanji": "藩制一覧表第六 (佐嘉) / 藩制一覧表第六 (佐倉)", "page_header_en": "Domain Survey Table 6 — STACKED: Saga top half / Sakura-han bottom half", "table_number": 6, "page_topic": "Saga demographics (top) + Sakura-han entry beginning (bottom)", "page_summary_en": "This page is STACKED — the top half completes Saga's entry (士族人員 23,823 + 卒人員 43,488 + 卒戸數 9,369 + 僧人員 4,412), and the bottom half begins ○佐倉藩 (Sakura-han, a Sakai domain in Shimousa) as a NEW DOMAIN. The ○ marker at mid-page is the source's domain-boundary signal. Annotations distinguish the two domains' data."}]};

pose": "english_translation", "value": "Sōdaka = 369,411 koku. The base assessed kokudaka before new-field additions. Below the formal title sōdaka of 369k, the actual Chōshū domain held substantially more land via new-field development (see 外高 column to the left)."}, {"purpose": "extracted_value", "value": "369,411 koku"}, {"purpose": "identifying", "value": "草高"}], "target": {"source": "images/upper_p193_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1535,1060,110,1518"}}}, {"id": "anno-choshu_koku-gaidaka", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "外 高 六拾貳萬八千五百九拾三石餘 (新田 打出)"}, {"purpose": "modern_jp_reading", "value": "外高 (新田・打出) 六十二万八千五百九拾三石余"}, {"purpose": "english_translation", "value": "External 'high' (new-field / uchikiage uplift) = 628,593 koku. Land developed after the original kokudaka assessment — primarily reclamation and intensification work over the Edo period. This is dramatically larger than the base 草高."}, {"purpose": "extracted_value", "value": "628,593 koku"}, {"purpose": "identifying", "value": "外 高"}], "target": {"source": "images/upper_p193_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1382,1393,110,579"}}}, {"id": "anno-choshu_koku-gaisanbutsu", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "外產物 生蠟稅 四百八十兩"}, {"purpose": "modern_jp_reading", "value": "外産物 — 生蠟税 四百八十両"}, {"purpose": "english_translation", "value": "External products — raw-wax tax = 480 ryō (gold). Side-listing of taxes collected on Chōshū's wax production. Sits between 合高 and 正租 in the page's column order."}, {"purpose": "extracted_value", "value": "480 ryō"}, {"purpose": "identifying", "value": "外產物"}], "target": {"source": "images/upper_p193_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1274,1057,110,1187"}}}, {"id": "anno-choshu_koku-godaka", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "合 高 九拾八萬八千四石餘"}, {"purpose": "modern_jp_reading", "value": "合高 (ごうだか) 九十八万八千四石余"}, {"purpose": "english_translation", "value": "Combined high (godaka) = 988,004 koku. INTERNAL HI ARITHMETIC NOTE: 369,411 + 628,593 = 998,004, NOT 988,004. The HI source itself has a 10,000-koku arithmetic inconsistency on this page (likely a printing error in the 1870 edition). MASTER captures the source faithfully — both the components and the printed-but-wrong total. The 校訂者云 marginal note flags the discrepancy."}, {"purpose": "extracted_value", "value": "988,004 koku"}, {"purpose": "identifying", "value": "合高"}], "target": {"source": "images/upper_p193_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1134,1221,110,1496"}}}, {"id": "anno-choshu_koku-seiso", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "正租 現米 貳拾萬六千九百拾石 錢拾壹萬六千七百五拾貳文"}, {"purpose": "modern_jp_reading", "value": "正租 (せいそ) 現米 二十万六千九百十石、錢 十一万六千七百五十二文"}, {"purpose": "english_translation", "value": "Main tax — rice in kind = 206,910 koku; copper-coin = 116,752 mon. The 正租 is the principal land tax; the entry shows both the rice and the coin components."}, {"purpose": "extracted_value", "value": "206,910 koku rice"}, {"purpose": "identifying", "value": "正租 現米"}], "target": {"source": "images/upper_p193_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1012,1142,110,933"}}}, {"id": "anno-choshu_koku-zatsuzei", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "雜稅 米壹萬四千五百八拾三石 銀八百九拾貳貫八百六拾目 石炭 三百二十兩"}, {"purpose": "modern_jp_reading", "value": "雑税 (ざつぜい) — 米14,583石、銀892貫860目、石炭320両"}, {"purpose": "english_translation", "value": "Miscellaneous tax: 14,583 koku rice + 892.86 kanme silver + 320 ryō coal-tax. Chōshū's 雜稅 entry includes a coal levy — distinctive among western-Japan domains; reflects the early coal extraction in the Yamaguchi region."}, {"purpose": "extracted_value", "value": "14,583 koku rice + silver + coal"}, {"purpose": "identifying", "value": "雜稅"}], "target": {"source": "images/upper_p193_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:743,1051,110,1273"}}}], "saga_demographics": [{"id": "anno-saga_dem-shizoku", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "士族人員 貳萬三千八百二十三人"}, {"purpose": "modern_jp_reading", "value": "士族人員 (しぞくじんいん) 二万三千八百二十三人"}, {"purpose": "english_translation", "value": "Shizoku persons = 23,823. Saga's distinctively large shizoku class — about 30% of total population — reflects the domain's policy of preserving samurai status broadly across the late-bakumatsu reform period. Saga's 大隈 Ōkuma Shigenobu rose from this samurai milieu to become a central-government leader."}, {"purpose": "extracted_value", "value": "23,823 persons"}, {"purpose": "identifying", "value": "士族人員"}], "target": {"source": "images/lower_p046_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2513,981,110,1016"}}}, {"id": "anno-saga_dem-sotsu", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "卒人員 四萬三千四百八拾八人"}, {"purpose": "modern_jp_reading", "value": "卒人員 (そつじんいん) 四万三千四百八十八人"}, {"purpose": "english_translation", "value": "Sotsu persons = 43,488. Saga's sotsu count is nearly double its shizoku count — unusual proportion. Combined shizoku+sotsu = 67,311, giving a retainer-per-1000-koku ratio of 92.9 against the 724,739 godaka."}, {"purpose": "extracted_value", "value": "43,488 persons"}, {"purpose": "identifying", "value": "卒人員"}], "target": {"source": "images/lower_p046_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2236,985,110,846"}}}, {"id": "anno-saga_dem-sotsu_kosuu", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "卒戸數 九千三百六十九軒"}, {"purpose": "modern_jp_reading", "value": "卒戸数 (そつこすう) 九千三百六十九軒"}, {"purpose": "english_translation", "value": "Sotsu households = 9,369. Cross-check: 43,488 persons / 9,369 households = 4.64 persons per household. Consistent."}, {"purpose": "extracted_value", "value": "9,369 households"}, {"purpose": "identifying", "value": "卒戸數"}], "target": {"source": "images/lower_p046_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2100,986,110,1231"}}}, {"id": "anno-saga_dem-sakura", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "○佐倉藩 (page bottom — NEW DOMAIN BEGINS HERE)"}, {"purpose": "modern_jp_reading", "value": "佐倉藩 (さくらはん)。下総国の堀田・酒井家。佐嘉と紛らわしいが別藩。"}, {"purpose": "english_translation", "value": "Sakura-han marker — this page is STACKED. Saga's entry ENDS at mid-page, and ○佐倉藩 (Sakura-han, a different Sakai-family domain in Shimousa Province) BEGINS at the bottom-left. The two domains share a page but are entirely separate entities. The page-bottom annotation 藩制一覽表第六 (佐倉) corresponds to the Sakura entry. This stacked-page pattern is the basis of HI's cross-page contamination risk — values can drift between adjacent entries if extraction isn't careful."}, {"purpose": "identifying", "value": "○佐倉藩"}], "target": {"source": "images/lower_p046_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1984,985,110,685"}}}], "saga_kokudaka": [{"id": "anno-saga_koku-header", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "○佐嘉藩"}, {"purpose": "modern_jp_reading", "value": "佐嘉藩 (さがはん)。古い表記。現代では「佐賀」が標準。"}, {"purpose": "english_translation", "value": "Saga domain (written 佐嘉, the kyūjitai form). Modern Japanese uses 佐賀. The dataset's domain_jp uses 佐嘉藩 for vol2 entries and the canonical name 佐賀藩 in the analytic layer. Saga has NO vol1 entry in HI — it appears only in vol2 (a gap documented in memory reference_saga_HI_gap)."}, {"purpose": "identifying", "value": "○佐嘉藩"}], "target": {"source": "images/lower_p045_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2644,1137,110,429"}}}, {"id": "anno-saga_koku-omotedaka", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "高 貳拾壹萬千五百拾九石九升九合"}, {"purpose": "modern_jp_reading", "value": "高 (たか) 二十一万一千五百十九石余"}, {"purpose": "english_translation", "value": "Omotedaka-equivalent = 211,519 koku. The formal-title kokudaka of Saga (the Nabeshima domain's bakufu-registered rating). The actual productive land was much larger via new-field development — see the 新田高 column to the left."}, {"purpose": "extracted_value", "value": "211,519.099 koku"}, {"purpose": "identifying", "value": "高"}], "target": {"source": "images/lower_p045_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2512,1137,110,951"}}}, {"id": "anno-saga_koku-shinden", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "新田高 (外二) 五拾壹萬三千五百八拾石貳斗壹升六合貳勺"}, {"purpose": "modern_jp_reading", "value": "新田高 (しんでんだか・外二) 五十一万三千五百八十石余"}, {"purpose": "english_translation", "value": "New-field high = 513,580.22 koku. Saga had massive new-field development across the Edo period — the Nabeshima domain led on intensive paddy reclamation in the Saga Plain. The combined formal + new-field total approaches 725k koku, dramatically larger than the 357k formal omotedaka most secondary sources cite."}, {"purpose": "extracted_value", "value": "513,580.2162 koku"}, {"purpose": "identifying", "value": "新田高"}], "target": {"source": "images/lower_p045_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2380,1301,110,577"}}}, {"id": "anno-saga_koku-niko", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "貮口合 平均 七拾貳萬四千七百三拾九石三斗壹升五合貳勺"}, {"purpose": "modern_jp_reading", "value": "貮口合 平均 (にこうごうへいきん) 七十二万四千七百三十九石余 — 五ヶ年平均"}, {"purpose": "english_translation", "value": "Two-mouth combined, 5-year average = 724,739.3152 koku. Saga's unusual phrasing for what is essentially godaka: the combined high of formal + new-field, averaged over 5 years. The 貮口合 (ni-kou-gō, 'two-mouth combined') phrasing is distinctive to Saga's HI entry and reflects the domain's split-territory administrative pattern."}, {"purpose": "extracted_value", "value": "724,739.3152 koku"}, {"purpose": "identifying", "value": "貮口合 / 平均"}], "target": {"source": "images/lower_p045_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2242,969,110,1355"}}}, {"id": "anno-saga_koku-seiso", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "正租 米 貳拾壹萬三千四百七十八石貳斗七升貳合貳勺"}, {"purpose": "modern_jp_reading", "value": "正租 (せいそ) 米 二十一万三千四百七十八石余"}, {"purpose": "english_translation", "value": "Main tax rice (seiso) = 213,478.27 koku. About 30% of the 貮口合 724,739 total — high effective tax rate, characteristic of Saga's tightly-administered agricultural economy under Nabeshima fiscal discipline."}, {"purpose": "extracted_value", "value": "213,478.2722 koku"}, {"purpose": "identifying", "value": "正租"}], "target": {"source": "images/lower_p045_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1962,1059,110,260"}}}], "satsuma_kokudaka": [{"id": "anno-satsuma_kokudaka-taishi", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "隊士 四百六十四人"}, {"purpose": "modern_jp_reading", "value": "隊士 (たいし) 四百六十四人"}, {"purpose": "english_translation", "value": "Taishi (corps-member) headcount = 464 persons. Printed in the rightmost narrow column at the top of the entry — a single-figure officer count that also appears on Satsuma's military page."}, {"purpose": "extracted_value", "value": "464 persons"}, {"purpose": "identifying", "value": "隊士"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2599,1177,110,684"}}}, {"id": "anno-satsuma_kokudaka-header", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "○鹿兒島藩"}, {"purpose": "modern_jp_reading", "value": "鹿児島藩 (かごしまはん)"}, {"purpose": "english_translation", "value": "Kagoshima domain (Satsuma). The ○ marker introduces a new domain entry — the page-attribution signal for the extraction pipeline."}, {"purpose": "identifying", "value": "○鹿兒島藩"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2429,1428,110,622"}}}, {"id": "anno-satsuma_kokudaka-sodaka", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "草高 八拾六萬九千五百九十三石五斗七升六合六勺四才 (内 琉球國高引除)"}, {"purpose": "modern_jp_reading", "value": "草高 (くさだか) は八十六万九千五百九十三石五斗七升六合六勺四才。内訳に琉球国高は控除。"}, {"purpose": "english_translation", "value": "Sōdaka (gross-yield assessed kokudaka) = 869,593.5766 koku, EXCLUDING Ryūkyū tribute (琉球國高引除). The Ryūkyū Kingdom paid tribute to Satsuma but was not part of the formal Japanese kokudaka system."}, {"purpose": "extracted_value", "value": "869,593.5766 koku"}, {"purpose": "identifying", "value": "草高"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2310,1093,110,2109"}}}, {"id": "anno-satsuma_kokudaka-sondaka", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "内 損高 七拾七萬五千三百六十三石五斗七升五合七勺"}, {"purpose": "modern_jp_reading", "value": "うち損高 (そんだか) は七十七万五千三百六十三石"}, {"purpose": "english_translation", "value": "Of which sondaka (loss-adjusted high; the portion deducted for crop failures and other losses over the 5-year averaging window) = 775,363.5757 koku."}, {"purpose": "extracted_value", "value": "775,363.5757 koku"}, {"purpose": "identifying", "value": "内 損高"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2169,1173,110,1860"}}}, {"id": "anno-satsuma_kokudaka-gendaka", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "高 七拾貳萬九千四百八十六石六斗九升四合八勺"}, {"purpose": "modern_jp_reading", "value": "高は七十二万九千四百八十六石"}, {"purpose": "english_translation", "value": "And 'high' (the remaining productive-yield separated from the sondaka loss-portion) = 729,486.6948 koku. Note: this is a separate sub-category, not a simple subtraction of sondaka from sōdaka."}, {"purpose": "extracted_value", "value": "729,486.6948 koku"}, {"purpose": "identifying", "value": "高"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2037,1253,110,1695"}}}, {"id": "anno-satsuma_kokudaka-genseki", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "現石 貳萬六千百五十六石八斗貳合"}, {"purpose": "modern_jp_reading", "value": "現石 (げんせき) は二万六千百五十六石"}, {"purpose": "english_translation", "value": "Genseki (current rice on hand / actual rice tax collected) = 26,156.802 koku. The actual flow of rice to domain coffers — much smaller than the assessed kokudaka because of tax-rate fractions, exemptions, and losses."}, {"purpose": "extracted_value", "value": "26,156.802 koku"}, {"purpose": "identifying", "value": "現石"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1911,1169,110,1442"}}}, {"id": "anno-satsuma_kokudaka-genkoku", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "現穀 二萬六千九百八拾六石四升八合"}, {"purpose": "modern_jp_reading", "value": "現穀 (げんこく) は二万六千九百八十六石余"}, {"purpose": "english_translation", "value": "Genkoku (current grain — rice and other staple grains in domain stocks) ≈ 26,986 koku. Separate from genseki, this captures domain-held grain rather than yield-collected rice."}, {"purpose": "extracted_value", "value": "≈26,986 koku"}, {"purpose": "identifying", "value": "現穀"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1784,1170,110,2123"}}}, {"id": "anno-satsuma_kokudaka-satou", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "砂糖 五百〇九萬二千八百二十五斤"}, {"purpose": "modern_jp_reading", "value": "砂糖 (さとう) 五百九万二千八百二十五斤 — 約3055トン"}, {"purpose": "english_translation", "value": "Sugar = 5,092,825 jin (~3,055 metric tons per year). Satsuma's famous Ryūkyū sugar monopoly. This is one of the most economically distinctive entries in the entire HI corpus — the southern domain's near-exclusive control over Ryūkyū-routed cane sugar trade was a major fiscal advantage."}, {"purpose": "extracted_value", "value": "5,092,825 jin (~3,055 metric tons)"}, {"purpose": "identifying", "value": "砂糖"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1649,1171,110,1955"}}}, {"id": "anno-satsuma_kokudaka-chashu", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "茶種 六千七百七十石四斗二升"}, {"purpose": "modern_jp_reading", "value": "茶種 (ちゃしゅ) 六千七百七十石余"}, {"purpose": "english_translation", "value": "Tea seed = 6,770.42 koku. Satsuma's tea production was significant but secondary to the famous Ryūkyū sugar (see 砂糖 column to the right)."}, {"purpose": "extracted_value", "value": "6,770.42 koku"}, {"purpose": "identifying", "value": "茶種"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1505,1168,110,1105"}}}, {"id": "anno-satsuma_kokudaka-kouzo", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "楮 九萬六千七百七十六貫四百二十九匁九分"}, {"purpose": "modern_jp_reading", "value": "楮 (こうぞ) 九万六千七百七十六貫余 (約363トン) — 紙の原料"}, {"purpose": "english_translation", "value": "Paper mulberry (kōzo) = 96,776.43 kan (~363 metric tons). Raw material for traditional washi paper-making."}, {"purpose": "extracted_value", "value": "96,776.4299 kanme"}, {"purpose": "identifying", "value": "楮"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1359,1170,110,2521"}}}, {"id": "anno-satsuma_kokudaka-seirou", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "生蠟 四萬四千七百十八斤八合"}, {"purpose": "modern_jp_reading", "value": "生蠟 (せいろう) 四万四千七百十八斤八合 — 約26.8トン"}, {"purpose": "english_translation", "value": "Raw wax (seirō) = 44,718.8 jin (~26.8 metric tons). Vegetable wax pressed from haze (sumac) berries — a major southern-Kyushu export used for candles and polish."}, {"purpose": "extracted_value", "value": "44,718.8 jin"}, {"purpose": "identifying", "value": "生蠟"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1237,1171,110,1099"}}}, {"id": "anno-satsuma_kokudaka-asao", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "麻苧 二千八百七十七斤"}, {"purpose": "modern_jp_reading", "value": "麻苧 (あさお / まお) 二千八百七十七斤"}, {"purpose": "english_translation", "value": "Hemp / ramie fiber = 2,877 jin (~1.7 metric tons). Used for traditional summer-weight cloth and ropes."}, {"purpose": "extracted_value", "value": "2,877 jin"}, {"purpose": "identifying", "value": "麻苧"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1102,1169,110,929"}}}, {"id": "anno-satsuma_kokudaka-zatsuzei", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "雜稅 錢 五萬九千七百九十六貫三百七十二文"}, {"purpose": "modern_jp_reading", "value": "雑税 (ざつぜい) 錢 五万九千七百九十六貫三百七十二文 — 銭貨単位"}, {"purpose": "english_translation", "value": "Miscellaneous tax in copper coin = 59,796.372 kan-mon."}, {"purpose": "extracted_value", "value": "59,796.372 kan-mon"}, {"purpose": "identifying", "value": "雜稅銭"}], "target": {"source": "images/upper_p088_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:965,1169,110,1773"}}}], "satsuma_military": [{"id": "anno-satsuma_military-header", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "○鹿児島藩 (書ナラス)"}, {"purpose": "modern_jp_reading", "value": "鹿児島藩。書ナラス (かきならず) — 「記載なし」「書面に出さない」の意。"}, {"purpose": "english_translation", "value": "Kagoshima domain — with the explicit annotation 書ナラス ('not written / not specified'). This is the most pedagogically significant annotation in HI: it literally documents Satsuma's refusal to disclose its military structure to the new central government. Satsuma at this point was the dominant Restoration power but politically still acting semi-independently."}, {"purpose": "identifying", "value": "○鹿児島藩"}], "target": {"source": "images/lower_p163_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2254,1226,110,2021"}}}, {"id": "anno-satsuma_military-taishi", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "隊士 四百六十四人"}, {"purpose": "modern_jp_reading", "value": "隊士 (たいし) 四百六十四人"}, {"purpose": "english_translation", "value": "Taishi (corps-member) headcount = 464 persons. Printed at the head of Satsuma's text block on this page, paralleling the same figure on the kokudaka page."}, {"purpose": "extracted_value", "value": "464 persons"}, {"purpose": "identifying", "value": "隊士"}], "target": {"source": "images/lower_p163_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2134,1149,110,1856"}}}, {"id": "anno-satsuma_military-shitou", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "(一二) 隊長司令 / 士等役員 千百六人"}, {"purpose": "modern_jp_reading", "value": "(一・二) 隊長司令 / 士等役員 (したいやくいん) 千百六人"}, {"purpose": "english_translation", "value": "(1st/2nd) battalion commanders + shi-tō yakuin (officer-rank samurai-class members) = 1,106 persons. Distinct from the bare standing army count — these are officer-equivalent samurai with formal positions in the post-1869 reorganization."}, {"purpose": "extracted_value", "value": "1,106 persons"}, {"purpose": "identifying", "value": "士等役員"}], "target": {"source": "images/lower_p163_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1998,1311,110,870"}}}, {"id": "anno-satsuma_military-troops", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "兵卒人員 千五百六十八人"}, {"purpose": "modern_jp_reading", "value": "兵卒人員 (へいそつじんいん) 千五百六十八人 — 「庚午三月調」(明治三年三月)"}, {"purpose": "english_translation", "value": "Heisotsu jin'in (rank-and-file standing army) = 1,568 men, surveyed March 1870. This figure is dramatically below reality — Satsuma at this time fielded roughly 16,000 Spencer-rifle-armed troops (per Ravina's biography of Saigō, the 1868–1869 Boshin force, and Esposito's Osprey volume on the Boshin War). The 1,568 likely represents only the formal post-1869-reform standing army on paper, not the actual armed force."}, {"purpose": "extracted_value", "value": "1,568 persons"}, {"purpose": "identifying", "value": "兵卒人員"}], "target": {"source": "images/lower_p163_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1873,1313,110,886"}}}, {"id": "anno-satsuma_military-sanji", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "大參事 一員 / 權大參事 九員 / 少參事 廿一員 / 權少參事 十六員 — (原來) 庚午三月調"}, {"purpose": "modern_jp_reading", "value": "大参事 (1) / 権大参事 (9) / 少参事 (21) / 権少参事 (16) の役職員数 — 庚午年三月(1870年3月)時点"}, {"purpose": "english_translation", "value": "Officer roster (March 1870 survey): Daisanji 1, Gondaisanji 9, Shōsanji 21, Gonshōsanji 16. These are the post-1869 hanseki-hōkan administrative titles after the daimyō formally returned the fief to the Emperor. Counting officers (but not armed strength) was Satsuma's pattern of partial disclosure."}, {"purpose": "extracted_value", "value": "1 + 9 + 21 + 16 officers"}, {"purpose": "identifying", "value": "大参事 / 権大参事 / 少参事 / 権少参事"}], "target": {"source": "images/lower_p163_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1571,1314,110,582"}}}], "tosa_demographics": [{"id": "anno-tosa_dem-shizoku", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "士族人口 三萬五千六十八人 (内 男 一萬五千三百六十八人 / 女 一萬九千七百人)"}, {"purpose": "modern_jp_reading", "value": "士族人口 (しぞくじんこう) 三万五千六十八人 — うち男 一万五千三百六十八人、女 一万九千七百人"}, {"purpose": "english_translation", "value": "Shizoku population = 35,068 persons (M 15,368 + F 19,700 = 35,068 — sum checks ✓). Tosa's unusually large shizoku class reflects its gōshi (郷士) system — rural land-holding lower samurai who supplied the radical Restoration-era leaders (Sakamoto Ryōma, Nakaoka Shintarō, et al.)."}, {"purpose": "extracted_value", "value": "35,068 persons"}, {"purpose": "identifying", "value": "士族人口"}], "target": {"source": "images/upper_p090_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2054,1331,110,596"}}}, {"id": "anno-tosa_dem-shi_kosuu", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "内 士族戸數 七千二百六十九戸"}, {"purpose": "modern_jp_reading", "value": "うち士族戸数 (しぞくこすう) 七千二百六十九戸"}, {"purpose": "english_translation", "value": "Of which: shizoku households = 7,269. Cross-check: 35,068 persons / 7,269 households = 4.83 persons per household. Plausible."}, {"purpose": "extracted_value", "value": "7,269 households"}, {"purpose": "identifying", "value": "内 士族戸數"}], "target": {"source": "images/upper_p090_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1928,1077,110,1272"}}}, {"id": "anno-tosa_dem-sotsu_kosuu", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "卒族戸數 三千七百十三戸"}, {"purpose": "modern_jp_reading", "value": "卒族戸数 (そつぞくこすう) 三千七百十三戸"}, {"purpose": "english_translation", "value": "Sotsu households = 3,713. Cross-check: 17,681 / 3,713 = 4.76 persons per household. Consistent with shizoku ratio."}, {"purpose": "extracted_value", "value": "3,713 households"}, {"purpose": "identifying", "value": "卒族戸數"}], "target": {"source": "images/upper_p090_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1792,1079,110,1091"}}}, {"id": "anno-tosa_dem-sotsu", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "卒族人口 壹萬七千六百八拾壹人"}, {"purpose": "modern_jp_reading", "value": "卒族人口 (そつぞくじんこう) 一万七千六百八十一人"}, {"purpose": "english_translation", "value": "Sotsu population = 17,681 persons. Combined with shizoku 35,068, total samurai-class = 52,749 = about 10% of total population — moderate by focal-4 standards."}, {"purpose": "extracted_value", "value": "17,681 persons"}, {"purpose": "identifying", "value": "卒族人口"}], "target": {"source": "images/upper_p090_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1518,1077,110,925"}}}, {"id": "anno-tosa_dem-eta", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "穢多戸數 三千三百九十六戸"}, {"purpose": "modern_jp_reading", "value": "穢多 (えた) 戸数 — 江戸時代の被差別民集団の戸数。1871年の解放令前の最後の公式集計の一つ。"}, {"purpose": "english_translation", "value": "Eta households = 3,396. This is the outcast-class population in Edo-period status hierarchy. HI was compiled in 1870, less than a year before the 1871 解放令 (kaihō rei, emancipation edict) that formally abolished the eta-hinin status category — making HI one of the last official tallies of the pre-emancipation outcast population."}, {"purpose": "extracted_value", "value": "3,396 households"}, {"purpose": "identifying", "value": "穢多戸數"}], "target": {"source": "images/upper_p090_right.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1250,1074,110,1090"}}}], "tosa_kokudaka": [{"id": "anno-tosa_koku-sodaka", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "草高 四拾九萬五千四百八十六石餘 (甲子ヨリ戊辰 五ヶ年平均)"}, {"purpose": "modern_jp_reading", "value": "草高 (くさだか) は四十九万五千四百八十六石余 — 甲子年から戊辰年までの五ヶ年平均"}, {"purpose": "english_translation", "value": "Sōdaka = 495,486 koku (5-year average, Kashi 甲子 to Boshin 戊辰 = 1864-1868). The averaging window deliberately covers the political crisis years leading into the Boshin War — a 5-year smoothing meant to even out unstable yields during the late-bakumatsu turmoil."}, {"purpose": "extracted_value", "value": "495,486 koku"}, {"purpose": "identifying", "value": "草高"}], "target": {"source": "images/upper_p089_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2460,1151,110,1678"}}}, {"id": "anno-tosa_koku-genmai", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "現米 拾八萬九千四百三十壹石餘"}, {"purpose": "modern_jp_reading", "value": "現米 (げんまい) は十八万九千四百三十一石余"}, {"purpose": "english_translation", "value": "Genmai (actual rice yielded) = 189,431 koku. About 38% of assessed sōdaka — higher than Chōshū's effective rate, reflecting Tosa's directly-taxed coastal-plain rice production."}, {"purpose": "extracted_value", "value": "189,431 koku"}, {"purpose": "identifying", "value": "現米"}], "target": {"source": "images/upper_p089_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2314,1231,110,1274"}}}, {"id": "anno-tosa_koku-products", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "諸產物 — 諸紙・砂糖・同白・黒蜜・鶏卵・蜂蜜・濾蜜・茶・椎茸・楊梅皮・楮草・松脂・茅蠟・蕨粉・蕨繩・檜繩・松節・松烟・桂根・燒物類 ..."}, {"purpose": "modern_jp_reading", "value": "諸産物の一覧 — 各種紙・砂糖・黒蜜・蜂蜜・茶・きのこ・薬草・蝋など"}, {"purpose": "english_translation", "value": "Domain products: various papers, sugar (white and black molasses varieties), eggs, honey, filtered honey, tea, shiitake mushrooms, mountain-tea, lacquer-tree bark, paper mulberry, pine resin, kayasoku wax, bracken-root flour, bracken cord, cypress cord, pine joints, pine soot, cassia root, baked ceramics... A long product list characteristic of HI for major domains."}, {"purpose": "identifying", "value": "諸產物"}], "target": {"source": "images/upper_p089_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2169,1147,110,2537"}}}, {"id": "anno-tosa_koku-zeigin", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "税銀 貳萬八千六百九拾七貫餘"}, {"purpose": "modern_jp_reading", "value": "税銀 (ぜいぎん) 二万八千六百九十七貫余"}, {"purpose": "english_translation", "value": "Silver tax = 28,697 kanme. The silver-payment component of Tosa's tax structure, alongside the rice (現米) and gold (税金) components."}, {"purpose": "extracted_value", "value": "28,697 kanme silver"}, {"purpose": "identifying", "value": "税銀"}], "target": {"source": "images/upper_p089_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:2039,1234,110,2528"}}}, {"id": "anno-tosa_koku-zeikin", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "税金 貳萬八千六百九十兩也"}, {"purpose": "modern_jp_reading", "value": "税金 (ぜいきん) 二万八千六百九十両"}, {"purpose": "english_translation", "value": "Gold tax = 28,690 ryō. Tosa collected a substantial portion of its tax revenue in gold coin, reflecting its access to coastal markets and the bakumatsu-era monetary economy."}, {"purpose": "extracted_value", "value": "28,690 ryō gold"}, {"purpose": "identifying", "value": "税金"}], "target": {"source": "images/upper_p089_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1901,1236,110,2529"}}}, {"id": "anno-tosa_koku-konmai", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "此米 三千五百八拾七石餘"}, {"purpose": "modern_jp_reading", "value": "此米 (このまい) 三千五百八十七石余"}, {"purpose": "english_translation", "value": "Rice sub-total (kono-mai) = 3,587 koku. A reconciliation entry; appears as part of the totals section."}, {"purpose": "extracted_value", "value": "3,587 koku"}, {"purpose": "identifying", "value": "此米"}], "target": {"source": "images/upper_p089_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1771,1232,110,2536"}}}, {"id": "anno-tosa_koku-soukei", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "總計 拾九萬三千七百拾八石餘"}, {"purpose": "modern_jp_reading", "value": "総計 (そうけい) 十九万三千七百十八石余"}, {"purpose": "english_translation", "value": "Grand total = 193,718 koku. The aggregated rice-equivalent total spanning the various tax categories."}, {"purpose": "extracted_value", "value": "193,718 koku"}, {"purpose": "identifying", "value": "總計"}], "target": {"source": "images/upper_p089_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1633,1237,110,1776"}}}, {"id": "anno-tosa_koku-kosuu", "type": "Annotation", "body": [{"purpose": "transcribing", "value": "戸數 九萬三千七百三十六戸"}, {"purpose": "modern_jp_reading", "value": "戸数 (こすう) は九万三千七百三十六戸"}, {"purpose": "english_translation", "value": "Households = 93,736. This is the page-89 total. Tosa's full Table 2 stretches across pages 89-L and 89-R, with the demographic detail continuing on p90."}, {"purpose": "extracted_value", "value": "93,736 households"}, {"purpose": "identifying", "value": "戸數"}], "target": {"source": "images/upper_p089_left.jpg", "selector": {"type": "FragmentSelector", "conformsTo": "http://www.w3.org/TR/media-frags/", "value": "xywh=pixel:1492,1147,110,1277"}}}]};
    // ====================================================

    let pages = PAGES_MANIFEST.pages;
    let pageIdx = 0;
    let annotations = [];
    let originalAnnotations = []; // for Reload
    let viewer = null;
    let activeAnnoId = null;
    let bboxOverlays = [];

    const $ = s => document.querySelector(s);
    const xywhRe = /xywh=pixel:([0-9.]+),([0-9.]+),([0-9.]+),([0-9.]+)/;

    function init() {
      const sel = $('#page-select');
      pages.forEach((p, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${p.sequence}. ${p.domain_en} — ${p.page_topic}`;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', e => loadPage(parseInt(e.target.value, 10)));
      $('#reload-orig').addEventListener('click', () => loadPage(pageIdx));
      $('#export-btn').addEventListener('click', exportJson);
      $('#shift-y-down').addEventListener('click', () => shiftAll(0, 50));
      $('#shift-y-up').addEventListener('click', () => shiftAll(0, -50));
      $('#shift-x-left').addEventListener('click', () => shiftAll(-50, 0));
      $('#shift-x-right').addEventListener('click', () => shiftAll(50, 0));
      loadPage(0);
    }

    function loadPage(idx) {
      pageIdx = idx;
      const p = pages[idx];
      // Deep-copy the inlined annotations for this page so edits don't mutate the original
      originalAnnotations = JSON.parse(JSON.stringify(ANNOTATIONS_BY_PAGE[p.id] || []));
      annotations = JSON.parse(JSON.stringify(originalAnnotations));
      annotations.forEach(a => {
        const m = xywhRe.exec(a.target.selector.value);
        if (m) a._bbox = { x: +m[1], y: +m[2], w: +m[3], h: +m[4] };
      });
      buildViewer(p.image);
      renderAnnList();
    }

    function buildViewer(imageUrl) {
      if (viewer) { viewer.destroy(); viewer = null; }
      document.querySelectorAll('.bbox-overlay').forEach(el => el.remove());
      bboxOverlays = [];

      viewer = OpenSeadragon({
        id: 'osd',
        prefixUrl: 'https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/',
        tileSources: { type: 'image', url: imageUrl },
        defaultZoomLevel: 0.85,
        minZoomLevel: 0.2,
        maxZoomPixelRatio: 4,
        showNavigator: true,
        navigatorPosition: 'BOTTOM_LEFT',
      });

      viewer.addHandler('open', () => addAllOverlays());
      viewer.addHandler('update-viewport', () => updateAllOverlayPositions());
      viewer.addHandler('animation', () => updateAllOverlayPositions());

      const osdEl = document.getElementById('osd');
      osdEl.addEventListener('mousemove', (e) => {
        if (!viewer || !viewer.world.getItemAt(0)) return;
        const rect = osdEl.getBoundingClientRect();
        const px = e.clientX - rect.left;
        const py = e.clientY - rect.top;
        const vp = viewer.viewport.pointFromPixel(new OpenSeadragon.Point(px, py));
        const img = viewer.viewport.viewportToImageCoordinates(vp);
        $('#readout').textContent = `x=${Math.round(img.x)}  y=${Math.round(img.y)}`;
      });
    }

    function addAllOverlays() {
      annotations.forEach(a => {
        const el = document.createElement('div');
        el.className = 'bbox-overlay';
        el.dataset.annoId = a.id;
        const ident = (a.body || []).find(b => b.purpose === 'identifying')?.value || '';
        const label = document.createElement('div');
        label.className = 'ident-label';
        label.textContent = ident;
        el.appendChild(label);
        document.getElementById('osd').appendChild(el);
        bboxOverlays.push({ annoId: a.id, el });
      });
      updateAllOverlayPositions();
    }

    function updateAllOverlayPositions() {
      if (!viewer) return;
      bboxOverlays.forEach(o => {
        const a = annotations.find(x => x.id === o.annoId);
        if (!a || !a._bbox) return;
        const tl = viewer.viewport.imageToViewerElementCoordinates(
          new OpenSeadragon.Point(a._bbox.x, a._bbox.y));
        const br = viewer.viewport.imageToViewerElementCoordinates(
          new OpenSeadragon.Point(a._bbox.x + a._bbox.w, a._bbox.y + a._bbox.h));
        o.el.style.left = `${tl.x}px`;
        o.el.style.top = `${tl.y}px`;
        o.el.style.width = `${br.x - tl.x}px`;
        o.el.style.height = `${br.y - tl.y}px`;
      });
    }

    function renderAnnList() {
      const list = $('#ann-list');
      list.innerHTML = '';
      annotations.forEach(a => {
        const ident = (a.body || []).find(b => b.purpose === 'identifying')?.value || '';
        const value = (a.body || []).find(b => b.purpose === 'extracted_value')?.value || '';
        const row = document.createElement('div');
        row.className = 'ann-row' + (a.id === activeAnnoId ? ' active' : '');
        row.dataset.annoId = a.id;
        row.innerHTML = `
          <div class="ident">${ident}</div>
          <div style="font-size:11px;color:#bdc3c7;margin-bottom:4px">${value}</div>
          <div class="coords">
            x:<input type="number" data-field="x" value="${a._bbox.x}">
            y:<input type="number" data-field="y" value="${a._bbox.y}">
            w:<input type="number" data-field="w" value="${a._bbox.w}">
            h:<input type="number" data-field="h" value="${a._bbox.h}">
          </div>
          <div class="coords" data-cx>cx=${Math.round(a._bbox.x + a._bbox.w/2)}, cy=${Math.round(a._bbox.y + a._bbox.h/2)}</div>
          <div class="controls">
            <button data-shift="x-50">←50</button>
            <button data-shift="x+50">→50</button>
            <button data-shift="y-50">↑50</button>
            <button data-shift="y+50">↓50</button>
          </div>
        `;
        row.addEventListener('click', e => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
          selectAnnotation(a.id);
        });
        row.querySelectorAll('input').forEach(inp => {
          inp.addEventListener('input', () => {
            const field = inp.dataset.field;
            const val = parseFloat(inp.value);
            if (!isNaN(val)) {
              a._bbox[field] = val;
              syncBboxToTarget(a);
              updateAllOverlayPositions();
              row.querySelector('[data-cx]').textContent =
                `cx=${Math.round(a._bbox.x + a._bbox.w/2)}, cy=${Math.round(a._bbox.y + a._bbox.h/2)}`;
            }
          });
        });
        row.querySelectorAll('button[data-shift]').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            const field = btn.dataset.shift[0];
            const delta = parseInt(btn.dataset.shift.slice(1), 10);
            a._bbox[field] += delta;
            syncBboxToTarget(a);
            updateAllOverlayPositions();
            renderAnnList();
          });
        });
        list.appendChild(row);
      });
    }

    function selectAnnotation(id) {
      activeAnnoId = id;
      document.querySelectorAll('.bbox-overlay').forEach(el => {
        el.classList.toggle('active', el.dataset.annoId === id);
      });
      document.querySelectorAll('.ann-row').forEach(el => {
        el.classList.toggle('active', el.dataset.annoId === id);
      });
      if (!viewer) return;
      const a = annotations.find(x => x.id === id);
      if (!a || !a._bbox) return;
      const padX = a._bbox.w * 3;
      const padY = a._bbox.h * 0.1;
      const rect = viewer.viewport.imageToViewportRectangle(
        a._bbox.x - padX, a._bbox.y - padY,
        a._bbox.w + 2*padX, a._bbox.h + 2*padY);
      viewer.viewport.fitBounds(rect, false);
    }

    function syncBboxToTarget(a) {
      a.target.selector.value = `xywh=pixel:${a._bbox.x},${a._bbox.y},${a._bbox.w},${a._bbox.h}`;
    }

    function shiftAll(dx, dy) {
      annotations.forEach(a => { a._bbox.x += dx; a._bbox.y += dy; syncBboxToTarget(a); });
      updateAllOverlayPositions();
      renderAnnList();
    }

    function exportJson() {
      const out = annotations.map(a => {
        const copy = JSON.parse(JSON.stringify(a));
        delete copy._bbox;
        return copy;
      });
      $('#export-box').value = JSON.stringify(out, null, 2);
      $('#export-box').focus();
      $('#export-box').select();
    }

    init();
  </script>
</body>
</html>
